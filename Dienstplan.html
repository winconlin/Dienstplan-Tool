<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MediPlan Pro | Bayern v7.4 (Split-Woche Restore)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page { size: A4 portrait; margin: 0.3cm; }
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            table { width: 100% !important; table-layout: fixed !important; font-size: 7.5pt !important; border-collapse: collapse; }
            th, td { border: 0.5pt solid #000 !important; padding: 2px !important; overflow: hidden; }
            .holiday-bg { background-color: #d1d5db !important; -webkit-print-color-adjust: exact; }
            .col-date { width: 35px; } .col-day { width: 40px; }
            select { appearance: none; border: none; background: transparent; width: 100%; font-weight: bold; }
            
            .print-only-stations #section-plan { display: none !important; }
            .print-only-stations #section-stats { display: none !important; }
            .print-only-stations #section-personal { display: none !important; }
            .print-only-stations #section-wishes { display: none !important; }
            .print-only-stations #section-stations { display: block !important; }
        }
        .wish-conflict { background-color: #fef08a !important; color: #b45309; }
        .conflict-red { background-color: #fca5a5 !important; color: #7f1d1d; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md p-4 flex justify-between items-center no-print">
        <h1 class="text-2xl font-black italic tracking-wider text-blue-400">Medi<span class="text-white">Plan</span> <span class="text-sm font-normal text-slate-400">Klinik v7.4</span></h1>
        <nav class="flex gap-4 text-sm font-bold">
            <button onclick="showSection('plan')" class="hover:text-blue-300 border-b-2 border-transparent transition text-blue-300 border-blue-300">Planung</button>
            <button id="btn-stations" onclick="showSection('stations')" class="hover:text-blue-300 transition">Stationen 🏥</button>
            <button onclick="showSection('stats')" class="hover:text-blue-300 transition">Statistik 🔥</button>
            <button onclick="showSection('wishes')" class="hover:text-blue-300 transition">Wünsche</button>
            <button onclick="showSection('personal')" class="hover:text-blue-300 transition">System</button>
        </nav>
    </header>

    <main class="flex-1 overflow-auto p-4 max-w-7xl mx-auto w-full">
        
        <div class="mb-4 flex gap-4 bg-white p-3 rounded shadow items-center border no-print">
            <input type="month" id="monthPicker" class="border p-2 rounded font-bold shadow-inner" onchange="renderCalendar(); renderStationPlan();">
            <div class="flex-1 flex gap-2 justify-end">
                <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded font-bold shadow hover:bg-slate-700 transition">⎙ Drucken</button>
            </div>
        </div>

        <section id="section-plan" class="section-content">
            <div class="bg-white p-6 rounded shadow border">
                <div class="flex justify-between items-end mb-4 pb-2 border-b">
                    <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tight" id="displayMonth">Monat</h2>
                    <div class="flex gap-2 no-print">
                        <button onclick="clearMonth()" class="bg-red-500 text-white px-4 py-2 rounded font-bold shadow hover:bg-red-600 transition">🗑️ Monat leeren</button>
                        <button onclick="autoPlan()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded font-bold shadow-lg hover:scale-105 transition">🪄 Autoplaner (Split-Woche)</button>
                    </div>
                </div>
                <h2 id="printHeaderTitle" class="hidden print:block text-2xl font-bold mb-4">Dienstplan</h2>
                <table class="w-full border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-800 text-white text-left">
                            <th class="p-2 border border-slate-700 col-day">Tag</th>
                            <th class="p-2 border border-slate-700 col-date">Dat.</th>
                            <th class="p-2 border border-slate-700 w-1/4">24h Dienst (AA)</th>
                            <th class="p-2 border border-slate-700 w-1/4">Visite (WE/FT)</th>
                            <th class="p-2 border border-slate-700 w-1/4">Hintergrund (OA)</th>
                        </tr>
                    </thead>
                    <tbody id="calendarBody" class="bg-white"></tbody>
                </table>
            </div>
        </section>

        <section id="section-stations" class="section-content hidden">
            <div class="bg-white p-6 rounded shadow border">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Stationsbesetzung MED I</h2>
                    <div class="flex gap-2 no-print">
                        <button onclick="autoStationPlan()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded font-bold shadow-lg hover:scale-105 transition print:hidden">🪄 Auto-Stationsplan</button>
                        <button onclick="document.body.classList.add('print-only-stations'); window.print(); document.body.classList.remove('print-only-stations');" class="bg-slate-800 text-white px-4 py-2 rounded font-bold shadow hover:bg-slate-700 transition">⎙ Drucken</button>
                    </div>
                </div>
                <h2 id="printHeaderStationTitle" class="hidden print:block text-2xl font-bold mb-4">Stationsbesetzung</h2>
                
                <table class="w-full border-collapse text-[11px] print:text-[9px]">
                    <thead id="stationHeader"></thead>
                    <tbody id="stationBody"></tbody>
                </table>
            </div>
        </section>

        <section id="section-stats" class="section-content hidden no-print">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded shadow border">
                    <h3 class="font-bold border-b mb-2 text-blue-700 uppercase">Assistenten (AA)</h3>
                    <div id="statsTableAA"></div>
                </div>
                <div class="bg-white p-4 rounded shadow border">
                    <h3 class="font-bold border-b mb-2 text-purple-700 uppercase">Oberärzte (OA)</h3>
                    <div id="statsTableOA"></div>
                </div>
            </div>
        </section>

        <section id="section-personal" class="section-content hidden no-print">
            <div class="grid grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded shadow border">
                    <div class="flex justify-between items-center border-b mb-4 pb-2">
                        <h3 class="font-bold text-slate-800 uppercase">Mitarbeiter & Matrix</h3>
                        <button onclick="clearWishes()" class="bg-red-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-red-600 transition">Wünsche leeren (Monat)</button>
                    </div>
                    <div class="grid grid-cols-4 gap-2 mb-2">
                        <input type="text" id="pName" placeholder="Name" class="border p-2 rounded text-sm"><input type="text" id="pId" placeholder="Atoss-Nr." class="border p-2 rounded text-sm">
                        <select id="pRole" class="border p-2 rounded text-sm"><option value="AA">Assistent</option><option value="OA">Oberarzt</option><option value="OA-EPU">OA-EPU</option></select>
                        <input type="number" id="pWork" placeholder="Stelle %" class="border p-2 rounded text-sm">
                    </div>
                    <button onclick="savePerson()" class="w-full bg-blue-600 text-white py-2 rounded font-bold shadow hover:bg-blue-700 transition">Arzt Hinzufügen</button>
                    <div id="staffList" class="mt-4 space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
                <div class="bg-white p-6 rounded shadow border text-center">
                    <h3 class="font-bold border-b mb-4 pb-2 text-red-600 uppercase italic">Konfiguration & Backup</h3>
                    <label class="flex items-center gap-2 font-bold text-xs cursor-pointer mb-6 bg-red-50 p-3 rounded border border-red-100">
                        <input type="checkbox" id="holidaySeasonMode" onchange="renderCalendar(); renderStationPlan();" class="w-5 h-5">
                        <span>Weihnachts-Sonderregelung<br><small class="text-gray-500">(Sa vor 24.12. bis So nach 06.01.)</small></span>
                    </label>
                    <button onclick="backupExport()" class="w-full bg-slate-100 border p-2 mb-2 rounded font-bold">💾 Alles sichern (Backup)</button>
                    <label class="block bg-slate-100 border p-2 mb-4 rounded font-bold text-center cursor-pointer">📂 Backup einlesen <input type="file" class="hidden" onchange="backupImport(event)"></label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportAllICS()" class="bg-green-600 text-white py-2 rounded font-bold">📥 Alle ICS</button>
                        <button onclick="exportAtossCSV()" class="bg-slate-800 text-white py-2 rounded font-bold">📄 Atoss CSV</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-wishes" class="section-content hidden no-print">
            <div class="bg-white p-6 rounded shadow border overflow-x-auto" id="wishTableContainer"></div>
        </section>

    </main>

    <script>
        let staff = JSON.parse(localStorage.getItem('mp_staff')) || [];
        let plan = JSON.parse(localStorage.getItem('mp_plan')) || {};
        let wishes = JSON.parse(localStorage.getItem('mp_wishes')) || {};
        let stationPlan = JSON.parse(localStorage.getItem('mp_station')) || {};

        function save() {
            localStorage.setItem('mp_staff', JSON.stringify(staff));
            localStorage.setItem('mp_plan', JSON.stringify(plan));
            localStorage.setItem('mp_wishes', JSON.stringify(wishes));
            localStorage.setItem('mp_station', JSON.stringify(stationPlan));
        }

        // --- FEIERTAGS-LOGIK BAYERN ---
        function getEasterSunday(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100,
                  d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25),
                  g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30,
                  i = Math.floor(c / 4), k = c % 4, L = (32 + 2 * e + 2 * i - h - k) % 7,
                  m = Math.floor((a + 11 * h + 22 * L) / 451),
                  month = Math.floor((h + L - 7 * m + 114) / 31),
                  day = ((h + L - 7 * m + 114) % 31) + 1;
            return new Date(year, month - 1, day);
        }

        function isHoliday(date) {
            const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
            const fixes = {"1.1":"Neujahr","6.1":"Hl. 3 Könige","1.5":"Tag d. Arbeit","15.8":"Mariä Himmelfahrt","3.10":"Tag d. Dt. Einheit","1.11":"Allerheiligen","25.12":"1. Weihnachtstag","26.12":"2. Weihnachtstag"};
            
            if (document.getElementById('holidaySeasonMode').checked) {
                let start = new Date(y, 11, 24); 
                while(start.getDay() !== 6) start.setDate(start.getDate() - 1);
                let end = (m === 1 && d <= 15) ? new Date(y, 0, 6) : new Date(y + 1, 0, 6);
                while(end.getDay() !== 0) end.setDate(end.getDate() + 1);
                if (date >= start && date <= end) return "Winterplan";
            }

            if (fixes[`${d}.${m}`]) return fixes[`${d}.${m}`];
            const easter = getEasterSunday(y);
            const diff = Math.round((date - easter) / 86400000);
            if (diff === -2) return "Karfreitag";
            if (diff === 1) return "Ostermontag";
            if (diff === 39) return "Christi Himmelfahrt";
            if (diff === 50) return "Pfingstmontag";
            if (diff === 60) return "Fronleichnam";
            
            let bub = new Date(y, 10, 22);
            while(bub.getDay() !== 3) bub.setDate(bub.getDate() - 1);
            if (d === bub.getDate() && m === 11) return "Buß- & Bettag";

            return null;
        }

        // --- AUTOPLANER MIT SPLIT-WOCHE (RESTORED) ---
        function clearMonth() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            if(!confirm("Möchten Sie den gesamten Plan für diesen Monat unwiderruflich löschen?")) return;
            const [y, m] = val.split('-').map(Number);
            const daysInMonth = new Date(y, m, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                const dk = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                plan[dk] = {AA:"", VISITE:"", OA:""};
            }
            save(); renderCalendar();
        }
        function autoPlan() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            if(!confirm("Möchten Sie den Autoplaner wirklich ausführen? Alle bestehenden Dienste für diesen Monat werden überschrieben!")) return;
            const [y, m] = val.split('-').map(Number); 
            const daysInMonth = new Date(y, m, 0).getDate();
            
            for(let d=1; d<=daysInMonth; d++) {
                plan[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = {AA:"", VISITE:"", OA:""};
            }
            let counters = {}; staff.forEach(p => counters[p.name] = 0);

            const getBest = (role, dk, excl = []) => {
                return staff.filter(p => (role === 'OA' ? p.role === 'OA' : p.role === 'AA') && !excl.includes(p.name) && !(wishes[dk]?.includes(p.name)))
                    .sort((a, b) => (counters[a.name] / (a.work || 100)) - (counters[b.name] / (b.work || 100)))[0];
            };

            for(let d=1; d<=daysInMonth; d++) {
                const dt = new Date(y, m-1, d);
                const dayIdx = dt.getDay();
                const dk = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

                if (dayIdx === 5) {
                    let oa = getBest('OA', dk);
                    if(oa) {
                        [0,1,2].forEach(offset => {
                            let targetD = d + offset; if(targetD > daysInMonth) return;
                            let targetKey = `${y}-${String(m).padStart(2,'0')}-${String(targetD).padStart(2,'0')}`;
                            if(!wishes[targetKey]?.includes(oa.name)) { plan[targetKey].OA = oa.name; counters[oa.name]++; }
                        });
                    }
                } else if (!plan[dk].OA) {
                    let oa = getBest('OA', dk); if(oa) { plan[dk].OA = oa.name; counters[oa.name]++; }
                }

                if (dayIdx === 0) { // Sonntag
                    let pA = getBest('AA', dk);
                    if(pA) {
                        [0, 2, 4].forEach(off => {
                            let tD = d + off; if(tD > daysInMonth) return;
                            let tK = `${y}-${String(m).padStart(2,'0')}-${String(tD).padStart(2,'0')}`;
                            if(!wishes[tK]?.includes(pA.name)) { plan[tK].AA = pA.name; counters[pA.name]++; }
                        });
                    }
                    let pB = (d + 1 <= daysInMonth) ? getBest('AA', `${y}-${String(m).padStart(2,'0')}-${String(d+1).padStart(2,'0')}`, [pA?.name]) : null;
                    if(pB) {
                        [1, 3, 5].forEach(off => {
                            let tD = d + off; if(tD > daysInMonth) return;
                            let tK = `${y}-${String(m).padStart(2,'0')}-${String(tD).padStart(2,'0')}`;
                            if(!wishes[tK]?.includes(pB.name)) { plan[tK].AA = pB.name; counters[pB.name]++; }
                        });
                    }
                }

                const holiday = isHoliday(dt);
                if (dayIdx === 6 || holiday) {
                    if (!plan[dk].AA) {
                        let aa = getBest('AA', dk); if(aa) { plan[dk].AA = aa.name; counters[aa.name]++; }
                    }
                    let vis = getBest('AA', dk, [plan[dk].AA]);
                    if (vis) { plan[dk].VISITE = vis.name; counters[vis.name] += 0.2; }
                }

                if (!plan[dk].AA) {
                    let fb = getBest('AA', dk); if(fb) { plan[dk].AA = fb.name; counters[fb.name]++; }
                }
            }
            save(); renderCalendar(); alert("Planung nach Split-Wochen-System erstellt!");
        }

        // --- STATIONSBESETZUNG ---
        const stationLayout = [
            { id: "s71_1", name: "Zimmer 1-4", category: "Station 7 - 1" },
            { id: "s71_2", name: "Zimmer 5-8", category: "Station 7 - 1" },
            { id: "s71_3", name: "Zimmer 13-18", category: "Station 7 - 1" },
            { id: "s51_1", name: "Zimmer 8-10", category: "Station 5 - 1" },
            { id: "s51_2", name: "Zimmer 11-14", category: "Station 5 - 1" },
            { id: "hkl", name: "HKL", category: "HKL" },
            { id: "cpu", name: "CPU", category: "CPU" },
            { id: "tk", name: "Tagesklinik/UKG", category: "Tagesklinik/UKG" },
            { id: "echo_1", name: "Echokardiographie", category: "Echokardiographie" },
            { id: "echo_2", name: "Echokardiographie", category: "Echokardiographie" },
            { id: "oa_1", name: "Oberärzte", category: "Oberärzte" },
            { id: "oa_2", name: "Oberärzte", category: "Oberärzte" },
            { id: "oa_3", name: "Oberärzte", category: "Oberärzte" },
            { id: "oa_4", name: "Oberärzte", category: "Oberärzte" },
            { id: "oa_5", name: "Oberärzte", category: "Oberärzte" },
            { id: "oa_6", name: "Oberärzte", category: "Oberärzte" },
            { id: "epu_1", name: "EPU", category: "EPU" },
            { id: "epu_2", name: "EPU", category: "EPU" },
            { id: "da_1", name: "Dienstärzte", category: "Dienstärzte" },
            { id: "da_2", name: "Dienstärzte", category: "Dienstärzte" },
            { id: "u1", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" },
            { id: "u2", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" },
            { id: "u3", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" },
            { id: "u4", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" },
            { id: "u5", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" },
            { id: "u6", name: "Urlaub / Zeitausgleich", category: "Urlaub / Zeitausgleich" }
        ];

        function autoStationPlan() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            if(!confirm("Möchten Sie den Stationsplan automatisch besetzen? Leere Felder werden (sofern möglich) überschrieben, Urlaub bleibt erhalten.")) return;
            
            const [y, m] = val.split('-').map(Number);
            const weeks = getWeeksInMonth(y, m);

            weeks.forEach(w => {
                const p = w.mondayDateStr.split('.'); 
                const yearStr = (p[2].length === 2) ? '20'+p[2] : p[2];
                const weekStartDate = new Date(parseInt(yearStr), parseInt(p[1])-1, parseInt(p[0]));
                
                const dMo = new Date(weekStartDate);
                const dSo = new Date(weekStartDate); dSo.setDate(dSo.getDate() - 1);
                
                const moKey = `${dMo.getFullYear()}-${String(dMo.getMonth()+1).padStart(2,'0')}-${String(dMo.getDate()).padStart(2,'0')}`;
                const soKey = `${dSo.getFullYear()}-${String(dSo.getMonth()+1).padStart(2,'0')}-${String(dSo.getDate()).padStart(2,'0')}`;

                let splitAA_Mo = plan[moKey] ? plan[moKey].AA : null;
                let splitAA_So = plan[soKey] ? plan[soKey].AA : null;

                const d1Row = stationLayout.find(r => r.category === "Dienstärzte" && (r.name && r.name.includes("Mo, Mi")));
                const d2Row = stationLayout.find(r => r.category === "Dienstärzte" && (r.name && r.name.includes("So, Di")));
                
                // Exclude urlaub doctors from auto assignment
                let urlaubDocs = new Set();
                stationLayout.forEach(row => {
                    if (row.category.includes("Urlaub") || row.category.includes("Zeitausgleich")) {
                        const key = `${w.key}_${row.id}`;
                        if (stationPlan[key]) urlaubDocs.add(stationPlan[key]);
                    }
                });

                if (splitAA_Mo && d1Row) stationPlan[`${w.key}_${d1Row.id}`] = splitAA_Mo;
                if (splitAA_So && d2Row) stationPlan[`${w.key}_${d2Row.id}`] = splitAA_So;

                let usedDocs = new Set();
                stationLayout.forEach(row => {
                    const key = `${w.key}_${row.id}`;
                    if (stationPlan[key]) usedDocs.add(stationPlan[key]);
                });

                const getAvailableDoc = (roleCond) => {
                    let available = staff.filter(p => roleCond(p) && !usedDocs.has(p.name) && !urlaubDocs.has(p.name));
                    if (available.length > 0) {
                        available.sort((a,b) => Math.random() - 0.5);
                        let picked = available[0].name;
                        usedDocs.add(picked);
                        return picked;
                    }
                    return null;
                };

                // Fill mandatory fields first
                stationLayout.forEach(row => {
                    if (row.category === "HKL" || row.category === "Echokardiographie" || row.category === "Dienstärzte") return;
                    const key = `${w.key}_${row.id}`;
                    if (stationPlan[key]) return; // already manually filled/has vacation etc.

                    let doc = null;
                    if (row.category === "EPU") doc = getAvailableDoc(p => p.role === "OA-EPU");
                    else if (row.category === "Oberärzte") doc = getAvailableDoc(p => p.role === "OA" || p.role === "OA-EPU");
                    else if (row.category.includes("Station") || row.category === "CPU" || row.category === "Tagesklinik/UKG") {
                        doc = getAvailableDoc(p => p.role === "AA");
                    }
                    if (doc) stationPlan[key] = doc;
                });

                // Try to fill optional HKL & Echo
                stationLayout.forEach(row => {
                    if (row.category !== "HKL" && row.category !== "Echokardiographie") return;
                    const key = `${w.key}_${row.id}`;
                    if (stationPlan[key]) return;
                    let doc = getAvailableDoc(p => p.role === "AA");
                    if (doc) stationPlan[key] = doc;
                });
            });

            save(); renderStationPlan(); alert("Stationsplan erfolgreich (soweit möglich) generiert.");
        }

        function getWeeksInMonth(year, month) {
            let weeks = [];
            let date = new Date(year, month - 1, 1);
            let firstDay = new Date(year, 0, 1);
            
            while(date.getDay() !== 1) {
                date.setDate(date.getDate() - 1);
            }
            
            let curr = new Date(date);
            let endMonth = new Date(year, month, 0);
            
            while (curr <= endMonth) {
                let d = new Date(curr);
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                let yearStart = new Date(d.getFullYear(), 0, 1);
                let week1 = new Date(yearStart);
                week1.setDate(week1.getDate() + 4 - (week1.getDay() || 7));
                let kw = 1 + Math.round(((d.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);

                weeks.push({
                    kw: kw,
                    mondayDateStr: `${String(curr.getDate()).padStart(2, '0')}.${String(curr.getMonth()+1).padStart(2, '0')}.${String(curr.getFullYear()).slice(-2)}`,
                    key: `${year}-KW${String(kw).padStart(2, '0')}`
                });
                curr.setDate(curr.getDate() + 7);
            }
            return weeks;
        }

        function renderStationPlan() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            const [y, m] = val.split('-').map(Number);
            const monthName = new Date(y, m-1).toLocaleString('de-DE', {month:'long'});
            document.getElementById('printHeaderStationTitle').innerText = "Stationsbesetzung MED I - " + monthName + " " + y;

            const weeks = getWeeksInMonth(y, m);
            
            let thead = `
                <tr class="bg-slate-300 font-bold border-b border-slate-400 text-center align-middle">
                    <th class="p-2 border-r border-slate-400 w-32" colspan="2">Kalenderwoche<br><span class="text-[9px] font-normal">1. Montag</span></th>
                    ${weeks.map(w => `<th class="p-2 border-r border-slate-400 w-24">${w.kw}<br><span class="text-[9px] font-normal">${w.mondayDateStr}</span></th>`).join('')}
                </tr>`;
            document.getElementById('stationHeader').innerHTML = thead;

            let tbody = '';
            let currentCat = null;
            let catCount = 0;

            stationLayout.forEach((row, index) => {
                if (row.category !== currentCat) {
                    currentCat = row.category;
                    catCount = stationLayout.filter(r => r.category === currentCat).length;
                }

                let tr = `<tr class="border-b border-slate-300 text-center align-middle ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'} hover:bg-slate-100 transition">`;
                
                let isFirstInCategory = stationLayout.findIndex(r => r.category === currentCat) === index;
                let siblings = stationLayout.filter(r => r.category === currentCat);
                let hasSub = siblings.some(r => r.name !== r.category);

                if (isFirstInCategory) {
                    let colsp = !hasSub ? 'colspan="2"' : '';
                    tr += `<td class="p-2 font-bold border-r border-slate-300" ${colsp} rowspan="${catCount}">${row.category}</td>`;
                }

                if (hasSub) {
                    let subText = row.name !== row.category ? row.name : "";
                    tr += `<td class="p-1 border-r border-slate-300 text-[10px] whitespace-nowrap">${subText}</td>`;
                }

                weeks.forEach(w => {
                    const cellKey = `${w.key}_${row.id}`;
                    const curr = stationPlan[cellKey] || '';
                    let opt = `<option value=""></option>`;
                    staff.forEach(p => {
                        let show = false;
                        if (row.category === "Oberärzte") show = (p.role === "OA" || p.role === "OA-EPU");
                        else if (row.category === "EPU") show = (p.role === "OA-EPU");
                        else if (row.category.includes("Urlaub") || row.category.includes("Zeitausgleich")) show = true;
                        else show = (p.role === "AA");

                        if (show) {
                            opt += `<option value="${p.name}" ${curr === p.name ? 'selected' : ''}>${p.name}</option>`;
                        }
                    });
                    
                    tr += `
                        <td class="p-0 border-r border-slate-300 relative">
                            <select onchange="saveStationPlan('${cellKey}', this.value)" class="w-full bg-transparent p-2 outline-none text-[11px] font-bold text-center print:appearance-none cursor-pointer">
                                ${opt}
                            </select>
                        </td>`;
                });

                tr += `</tr>`;
                tbody += tr;
            });

            document.getElementById('stationBody').innerHTML = tbody;
        }

        function saveStationPlan(key, val) {
            stationPlan[key] = val;
            save();
        }

        // --- HEATMAP & RENDERER ---
        function getHeatmapColor(val, min, max) {
            if (max <= min) return 'transparent';
            let p = (val - min) / (max - min);
            return p < 0.5 ? `rgba(${Math.floor(255*p*2)}, 255, 0, 0.3)` : `rgba(255, ${Math.floor(255*(2-p*2))}, 0, 0.3)`;
        }

        function renderCalendar() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            const [y, m] = val.split('-').map(Number); 
            const str = new Date(y, m-1).toLocaleString('de-DE', {month:'long', year:'numeric'});
            document.getElementById('displayMonth').innerText = str;
            document.getElementById('printHeaderTitle').innerText = "Dienstplan - " + str;
            const days = new Date(y, m, 0).getDate();
            let html = '';
            for(let d=1; d<=days; d++) {
                const dt = new Date(y, m-1, d);
                const dK = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const yesK = `${y}-${String(m).padStart(2,'0')}-${String(d-1).padStart(2,'0')}`;
                const h = isHoliday(dt); const isS = (h || dt.getDay() === 0 || dt.getDay() === 6);
                const check = (r) => {
                    const v = plan[dK]?.[r] || ''; if(!v) return '';
                    if(wishes[dK]?.includes(v)) return 'wish-conflict';
                    if(plan[yesK] && Object.values(plan[yesK]).includes(v)) return 'conflict-red';
                    return '';
                };
                html += `<tr class="${isS ? 'holiday-bg' : ''} border-b text-xs">
                    <td class="p-1 text-center font-bold text-slate-500">${dt.toLocaleDateString('de-DE',{weekday:'short'})}</td>
                    <td class="p-1 text-center font-bold border-l border-r">${d}.${h ? `<br><span class="text-[7px] text-red-600 font-normal leading-tight">${h}</span>`:''}</td>
                    <td class="p-0 ${check('AA')}">${createSelect(dK, 'AA')}</td>
                    <td class="p-0 ${check('VISITE')}">${(dt.getDay()===6 || h) ? createSelect(dK, 'VISITE') : ''}</td>
                    <td class="p-0 ${check('OA')}">${createSelect(dK, 'OA')}</td>
                </tr>`;
            }
            document.getElementById('calendarBody').innerHTML = html;
            renderStats(); renderWishMatrix();
        }

        function renderStats() {
            const val = document.getElementById('monthPicker').value; if(!val) return;
            const [y, m] = val.split('-').map(Number); 
            ['AA', 'OA'].forEach(role => {
                let data = staff.filter(p => p.role === role).map(p => {
                    let mD=0, mV=0, sD=0, sV=0;
                    for(let i=0; i<6; i++) {
                        let curM = `${new Date(y, m-1-i, 1).getFullYear()}-${String(new Date(y, m-1-i, 1).getMonth()+1).padStart(2,'0')}`;
                        Object.keys(plan).forEach(k => { if(k.startsWith(curM)) { if(plan[k].AA===p.name || plan[k].OA===p.name) { sD++; if(i==0) mD++; } if(plan[k].VISITE===p.name) { sV++; if(i==0) mV++; } } });
                    }
                    return { name: p.name, mD, mV, sD, sV };
                });
                const ex = (k) => ({ max: Math.max(...data.map(d=>d[k]),1), min: Math.min(...data.map(d=>d[k])) });
                const exMD=ex('mD'), exMV=ex('mV'), exSD=ex('sD'), exSV=ex('sV');
                let h = `<table class="w-full border-collapse border text-xs text-center"><thead><tr class="bg-slate-100"><th class="p-2 border text-left">Arzt</th><th class="p-2 border">24h (M)</th><th class="p-2 border">Visite (M)</th><th class="p-2 border">24h (6M)</th><th class="p-2 border">Visite (6M)</th></tr></thead><tbody>`;
                data.forEach(d => { h += `<tr><td class="p-2 border text-left font-bold">${d.name}</td><td class="p-2 border" style="background:${getHeatmapColor(d.mD, exMD.min, exMD.max)}">${d.mD}</td><td class="p-2 border" style="background:${getHeatmapColor(d.mV, exMV.min, exMV.max)}">${d.mV}</td><td class="p-2 border" style="background:${getHeatmapColor(d.sD, exSD.min, exSD.max)}">${d.sD}</td><td class="p-2 border" style="background:${getHeatmapColor(d.sV, exSV.min, exSV.max)}">${d.sV}</td></tr>`; });
                document.getElementById('statsTable'+role).innerHTML = h + "</tbody></table>";
            });
        }

        // Hilfsfunktionen (Select, Save, Backup, Staff)
        function createSelect(dK, role) { const curr = plan[dK]?.[role] || ''; let opt = `<option value="">-</option>`; staff.filter(p => (role === 'OA' ? p.role === 'OA' : p.role === 'AA')).forEach(p => { const isWarn = wishes[dK]?.includes(p.name); const label = p.name + (isWarn ? ' (!)' : ''); opt += `<option value="${p.name}" ${curr === p.name ? 'selected' : ''}>${label}</option>`; }); return `<select onchange="savePlan('${dK}', '${role}', this.value)" class="w-full bg-transparent p-1 outline-none text-[10px] print:font-bold">${opt}</select>`; }
        function savePlan(k, r, v) { if(!plan[k]) plan[k]={}; plan[k][r]=v; save(); renderCalendar(); }
        function showSection(id) { document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden')); document.getElementById('section-' + id).classList.remove('hidden'); document.querySelectorAll('header nav button').forEach(b => { b.classList.remove('text-blue-300', 'border-b-2', 'border-blue-300'); if(b.getAttribute('onclick').includes(`'${id}'`)) b.classList.add('text-blue-300', 'border-b-2', 'border-blue-300'); }); if(id === 'personal') renderStaff(); }
        function savePerson() { const n = document.getElementById('pName').value; if(!n) return; staff.push({ name: n, id: document.getElementById('pId').value, role: document.getElementById('pRole').value, work: document.getElementById('pWork').value || 100 }); save(); renderStaff(); renderCalendar(); renderStationPlan(); document.getElementById('pName').value = ''; document.getElementById('pId').value = ''; document.getElementById('pWork').value = ''; }
        function renderStaff() { document.getElementById('staffList').innerHTML = staff.map((p, i) => `<div class="bg-slate-50 p-1 border rounded flex justify-between text-[10px] items-center mb-1"><span>${p.name} (${p.id})</span><button onclick="staff.splice(${i},1); save(); renderStaff(); renderCalendar(); renderStationPlan();" class="text-red-500 font-bold px-2">X</button></div>`).join(''); }
        function renderWishMatrix() { const val = document.getElementById('monthPicker').value; if(!val) return; const [y, m] = val.split('-').map(Number);  const days = new Date(y, m, 0).getDate(); let head = `<tr><th class="border p-1 bg-slate-100">Tag</th>`; staff.forEach(p => head += `<th class="border p-1 text-[8px] h-24 align-bottom" style="writing-mode: vertical-rl;">${p.name}</th>`); let body = ''; for(let d=1; d<=days; d++) { const dk = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; let row = `<tr><td class="p-1 border bg-slate-50 text-center font-bold text-[10px]">${d}</td>`; staff.forEach(p => { const isSet = wishes[dk]?.includes(p.name); row += `<td class="border text-center cursor-pointer ${isSet ? 'bg-purple-500 text-white' : ''}" onclick="toggleWish('${dk}', '${p.name}')">${isSet ? 'X' : ''}</td>`; }); body += row + `</tr>`; } document.getElementById('wishTableContainer').innerHTML = `<h2 class="text-xl font-bold mb-4 text-purple-700 uppercase">Wünsche / Sperren</h2><table class="w-full text-xs border-collapse">${head + `</tr>` + body}</table>`; }
        function toggleWish(k, n) { if(!wishes[k]) wishes[k] = []; wishes[k] = wishes[k].includes(n) ? wishes[k].filter(i => i !== n) : [...wishes[k], n]; save(); renderCalendar(); }
        function backupExport() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({ staff, plan, wishes, stationPlan })], { type: 'application/json' })); a.download = `MediPlan_Backup.json`; a.click(); }
        function backupImport(e) { const r = new FileReader(); r.onload = (f) => { const d = JSON.parse(f.target.result); staff = d.staff || []; plan = d.plan || {}; wishes = d.wishes || {}; stationPlan = d.stationPlan || {}; save(); renderCalendar(); renderStationPlan(); renderStaff(); alert("Daten geladen!"); }; r.readAsText(e.target.files[0]); }
        function exportAllICS() { const m = document.getElementById('monthPicker').value; staff.forEach(p => { let ics = "BEGIN:VCALENDAR\nVERSION:2.0\n"; Object.keys(plan).forEach(k => { if(k.startsWith(m) && Object.values(plan[k]).includes(p.name)) { const isV = (plan[k].VISITE === p.name); const s = isV ? "090000" : (k.includes("-06") ? "090000" : "150000"); ics += `BEGIN:VEVENT\nSUMMARY:${isV ? 'Visite' : 'Dienst'}\nDTSTART:${k.replace(/-/g,'')}T${s}\nDTEND:${k.replace(/-/g,'')}T235900\nEND:VEVENT\n`; } }); const blob = new Blob([ics + "END:VCALENDAR"], { type: 'text/calendar' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Dienst_${p.name}.ics`; a.click(); }); }
        function exportAtossCSV() { let csv = "Personalnummer;Datum;Stunden\n"; Object.keys(plan).forEach(k => { ['AA', 'VISITE', 'OA'].forEach(r => { const p = staff.find(x => x.name === plan[k][r]); if(p) csv += `${p.id};${k};${r==='VISITE'?5:17}\n`; }); }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = "Atoss_Export.csv"; a.click(); }

        const now = new Date(); document.getElementById('monthPicker').value = now.toISOString().substring(0,7); renderStationPlan(); renderCalendar(); showSection('plan');
    </script>
</body>
</html>
